  delay: 2.0 # seconds between requests (polite crawl)
  results_per_locale: 10 # DDG returns ~10 results per page
  cache_dir: tmp/crawl_cache
extract_mantra:
  llm_engines: [qwen2.5:3b-instruct]
  llm_options:
    temperature: 0
    top_p: 0.9
    num_ctx: 24576
  input: tmp/mantra_urls.txt
  output: tmp/mantra_index.json
  cache_dir: tmp/crawl_cache
  delay: 1.0
  max_page_chars: 240000 # max chars to keep from a page (before chunking)
  chunk_chars: 12000 # chars per chunk sent to LLM (~3-4k tokens)
  chunk_overlap: 600 # overlap between chunks to avoid splitting mantras
dedup_mantras:
  aliases: phrase_aliases.json
  input: tmp/mantra_index.json
  output: tmp/mantra_index_deduped.json
enrich_mantras:
  # llm_engines: [qwen3.5:4b, qwen2.5:14b, gemma3:27b]  # Production grade?
  # llm_combine: qwen3.5:9b                             # Production grade?
  # llm_grader:  qwen3.5:9b                             # Production grade?
  llm_engines: [phi3:mini, qwen2.5:1.5b, gemma3:1b] # Development only
  llm_combine: qwen2.5:1.5b # Development only
  llm_grader: qwen2.5:1.5b # Development only
  llm_translator: qwen2.5:1.5b # Development only
  translator_llm: translategemma:27b # translategemma:12b
  translate_languages:
    en: English
    es: Spanish
    fr: French
    de: German
    it: Italian
    pt: Portuguese
    ru: Russian
    ar: Arabic
    he: Hebrew
    zh: Chinese
    ja: Japanese
    ko: Korean
    hi: Hindi
    sa: Sanskrit
    ta: Tamil
    th: Thai
    vi: Vietnamese
    id: Indonesian
    tr: Turkish
    pl: Polish
    nl: Dutch
    sv: Swedish
    uk: Ukrainian
  llm_options: # student drafts + merge: need some creativity for abstracts
    temperature: 0.3
    top_p: 0.9
    num_ctx: 32768
  grader_options: # grader: deterministic scoring
    temperature: 0
    num_ctx: 16384
  translator_options: # translator: faithful, no creativity; mantras are short phrases
    temperature: 0
    num_ctx: 2048
  input: tmp/mantra_index_deduped.json
  output: tmp/enriched_mantras.json
  max_source_chars: 10000
  http_timeout: 12
  grade:
    no_accurate_translations: 25
    abstract_quality: 25
    other_fields_accuracy: 30
    other_fields_quality: 20
merge_mantras:
  input: tmp/enriched_mantras.json
  output: assets/data/mantras.json
  min_abstract_chars: 300
  min_tags: 3
