<style>
/* ── Reset & base ───────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}

/* ── Theme variables ────────────────────────── */
:root{
  --bg-base:#0D0B1A;--bg-surface:#1A1535;--bg-card:#14112A;
  --brand:#7C3AED;--brand-on:#FFFFFF;
  --v300:#C4B5FD;--v400:#A78BFA;--v500:#8B5CF6;--v600:#7C3AED;--v700:#6D28D9;
  --txt-pri:#EDE9FE;--txt-sec:#8B83A3;--txt-mut:#5C5478;
  --accent-orange:#F97316;--accent-emerald:#10B981;--accent-red:#EF4444;--accent-amber:#F59E0B;
  --bdr:rgba(167,139,250,.2);--bdr-sub:rgba(167,139,250,.12);
  --input-fill:rgba(167,139,250,.08);
  --overlay:rgba(0,0,0,.4);
}
[data-theme="light"]{
  --bg-base:#FAFAFF;--bg-surface:#FFFFFF;--bg-card:#F3F0FF;
  --brand:#6D28D9;--brand-on:#FFFFFF;
  --v300:#C4B5FD;--v400:#A78BFA;--v500:#8B5CF6;--v600:#7C3AED;--v700:#6D28D9;
  --txt-pri:#1A1535;--txt-sec:#4A4458;--txt-mut:#767185;
  --bdr:rgba(109,40,217,.2);--bdr-sub:rgba(109,40,217,.12);
  --input-fill:rgba(109,40,217,.06);
  --overlay:rgba(0,0,0,.2);
}

body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg-base);color:var(--txt-pri);transition:margin-right .3s}
body.sidebar-open{margin-right:380px}

/* ── Top bar ────────────────────────────────── */
.topbar{position:sticky;top:0;z-index:50;background:var(--bg-surface);border-bottom:1px solid var(--bdr-sub);padding:.6rem 2rem;display:flex;align-items:center;gap:1.2rem}
.topbar h1{font-family:Cinzel,serif;font-size:1.3rem;color:var(--v500);white-space:nowrap}
.tab-bar{display:flex;gap:.3rem}
.tab-btn{padding:.4rem 1rem;border:1px solid transparent;border-radius:6px;background:none;color:var(--txt-sec);cursor:pointer;font-size:.82rem;font-weight:500}
.tab-btn:hover{background:rgba(139,92,246,.08)}
.tab-btn.active{background:var(--v600);color:#fff;border-color:var(--v600)}
.topbar-right{margin-left:auto;display:flex;gap:.6rem;align-items:center}
.theme-toggle{display:flex;align-items:center;gap:.1rem;background:var(--bg-card);border:1px solid var(--bdr-sub);border-radius:8px;padding:2px;overflow:hidden}
.theme-opt{display:flex;align-items:center;gap:3px;padding:.3rem .6rem;border:none;border-radius:6px;background:none;color:var(--txt-mut);cursor:pointer;font-size:.75rem;font-weight:500;transition:all .15s}
.theme-opt .material-icons{font-size:16px}
.theme-opt.active{background:var(--v600);color:#fff}
.status{font-size:.75rem;color:var(--txt-mut);min-width:50px;text-align:right}
.save-btn{padding:.35rem 1rem;background:var(--accent-emerald);color:#fff;border:none;border-radius:6px;cursor:pointer;font-weight:600;font-size:.8rem}
.save-btn:hover{opacity:.85}
.save-btn:disabled{opacity:.4;cursor:default}

/* ── Tabs content ───────────────────────────── */
.tab-content{display:none;padding:1.5rem 2rem 3rem}
.tab-content.active{display:block}

/* ── Section headings ───────────────────────── */
h2{color:var(--v500);margin:1.8rem 0 .8rem;border-bottom:1px solid var(--bdr-sub);padding-bottom:.4rem;font-size:1.05rem}
h2:first-child{margin-top:.5rem}
h3{color:var(--txt-sec);margin:1.2rem 0 .5rem;font-size:.85rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em}

/* ── Icon grid ──────────────────────────────── */
.icon-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:.5rem}
.icon-item{display:flex;align-items:center;gap:.7rem;padding:.65rem .85rem;background:var(--bg-card);border-radius:8px;cursor:pointer;border:2px solid transparent;transition:all .12s}
.icon-item:hover{border-color:var(--v500);background:var(--bg-surface)}
.icon-item .material-icons{font-size:22px;flex-shrink:0}
.icon-item-info{display:flex;flex-direction:column;overflow:hidden;min-width:0}
.icon-item-ctx{font-size:.78rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.icon-item-name{font-family:monospace;font-size:.65rem;color:var(--txt-mut);white-space:nowrap}

/* ── Color swatches ─────────────────────────── */
.color-row{display:flex;flex-wrap:wrap;gap:.6rem;margin-bottom:.5rem}
.swatch{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer}
.swatch:hover .swatch-box{border-color:var(--v400)}
.swatch-box{width:64px;height:44px;border-radius:8px;border:2px solid var(--bdr-sub);transition:border-color .15s}
.swatch-label{font-size:.65rem;color:var(--txt-sec)}
.swatch-hex{font-family:monospace;font-size:.6rem;color:var(--txt-mut)}

/* ── Color picker (in sidebar) ──────────────── */
.cpick-preview{width:100%;height:80px;border-radius:10px;border:2px solid var(--bdr-sub);margin-bottom:1rem}
.cpick-row{display:flex;align-items:center;gap:.8rem;margin-bottom:.8rem}
.cpick-native{width:48px;height:48px;border:none;border-radius:8px;cursor:pointer;padding:0;background:none}
.cpick-native::-webkit-color-swatch-wrapper{padding:0}
.cpick-native::-webkit-color-swatch{border-radius:8px;border:2px solid var(--bdr-sub)}
.cpick-hex-input{flex:1;padding:.5rem .7rem;background:var(--bg-base);border:1px solid var(--bdr-sub);border-radius:6px;color:var(--txt-pri);font-family:monospace;font-size:.9rem;outline:none}
.cpick-hex-input:focus{border-color:var(--v500)}
.cpick-info{font-size:.75rem;color:var(--txt-sec);margin-bottom:.3rem}
.cpick-info span{color:var(--v400);font-weight:600}
.cpick-note{font-size:.7rem;color:var(--txt-mut);margin-top:1.5rem;padding-top:1rem;border-top:1px solid var(--bdr-sub);line-height:1.5}

/* ── Font specimens ─────────────────────────── */
.font-specimen{background:var(--bg-card);border:1px solid var(--bdr-sub);border-radius:12px;padding:1.2rem 1.5rem;margin-bottom:.8rem}
.font-label{font-size:.7rem;color:var(--txt-mut);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.4rem}

/* ── Text style list ────────────────────────── */
.style-list{display:flex;flex-direction:column;gap:.4rem}
.style-row{display:flex;align-items:baseline;gap:1rem;padding:.5rem .8rem;background:var(--bg-card);border-radius:8px}
.style-name{font-family:monospace;font-size:.72rem;color:var(--v400);min-width:130px;flex-shrink:0}
.style-preview{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.style-meta{font-family:monospace;font-size:.6rem;color:var(--txt-mut);min-width:110px;text-align:right;flex-shrink:0}

/* ── Component preview ──────────────────────── */
.comp-row{display:flex;flex-wrap:wrap;gap:1rem;margin-bottom:1rem}
.comp-card{background:var(--bg-card);border:1px solid var(--bdr-sub);border-radius:16px;padding:1.2rem;min-width:200px;flex:1}
.comp-card h4{font-size:.75rem;color:var(--txt-mut);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.8rem}
.demo-btn{display:inline-block;background:var(--brand);color:var(--brand-on);border:none;border-radius:16px;padding:.7rem 2rem;font-size:.9rem;font-weight:600;cursor:default}
.demo-input{width:100%;padding:.55rem .8rem;background:var(--input-fill);border:1px solid var(--bdr-sub);border-radius:12px;color:var(--txt-pri);font-size:.85rem;outline:none}
.demo-input:focus{border-color:var(--v500)}
.demo-nav{display:flex;gap:1.5rem;padding:.6rem 1rem;background:var(--bg-surface);border:1px solid var(--bdr-sub);border-radius:12px}
.demo-nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:.65rem}
.demo-nav-item.sel{color:var(--v400)}
.demo-nav-item.unsel{color:var(--txt-mut)}
.demo-nav-item .material-icons{font-size:20px}
.comp-meta{font-family:monospace;font-size:.65rem;color:var(--txt-mut);margin-top:.5rem}

/* ── Sidebar ────────────────────────────────── */
.sidebar-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:var(--overlay);z-index:90}
.sidebar-overlay.open{display:block}
.sidebar{position:fixed;top:0;right:-380px;width:380px;height:100vh;background:var(--bg-surface);border-left:2px solid var(--v500);z-index:100;display:flex;flex-direction:column;transition:right .3s}
.sidebar.open{right:0}
.sidebar-header{padding:1rem 1.2rem;background:var(--bg-card);border-bottom:1px solid var(--bdr-sub);flex-shrink:0}
.sidebar-header-top{display:flex;align-items:center;justify-content:space-between}
.sidebar-close{background:none;border:none;color:var(--txt-sec);font-size:1.4rem;cursor:pointer;padding:.2rem .5rem;border-radius:4px}
.sidebar-close:hover{color:var(--txt-pri);background:var(--input-fill)}
.sidebar-current{display:flex;align-items:center;gap:.8rem;margin-top:.8rem;padding:.8rem;background:rgba(124,58,237,.12);border-radius:8px;border:2px solid var(--v500)}
.sidebar-current .material-icons{font-size:32px}
.sidebar-current-info{display:flex;flex-direction:column}
.sidebar-current-ctx{font-weight:600;font-size:.9rem}
.sidebar-current-name{font-family:monospace;font-size:.75rem;color:var(--v400)}
.sidebar-search{width:100%;padding:.5rem .8rem;margin-top:.6rem;background:var(--bg-base);border:1px solid var(--bdr-sub);border-radius:6px;color:var(--txt-pri);font-size:.85rem;outline:none}
.sidebar-search:focus{border-color:var(--v500)}
.sidebar-body{flex:1;overflow-y:auto;padding:.8rem}
.sidebar-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(85px,1fr));gap:.35rem}
.pick-btn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:.45rem .3rem;border-radius:6px;border:2px solid transparent;background:var(--bg-card);cursor:pointer;transition:all .1s;color:var(--txt-pri)}
.pick-btn:hover{border-color:var(--v500);background:var(--bg-surface)}
.pick-btn.active{border-color:var(--v400);background:rgba(124,58,237,.15)}
.pick-btn .material-icons{font-size:22px}
.pick-btn .pick-name{font-family:monospace;font-size:.48rem;color:var(--txt-mut);text-align:center;word-break:break-all}
</style>

/* ================================================================
   DOM helpers
   ================================================================ */
function el(tag, attrs, children) {
  var e = document.createElement(tag);
  if (attrs) Object.keys(attrs).forEach(function(k) {
    if (k === "className") e.className = attrs[k];
    else if (k.indexOf("on") === 0) e.addEventListener(k.slice(2), attrs[k]);
    else e.setAttribute(k, attrs[k]);
  });
  if (children) children.forEach(function(c) {
    if (typeof c === "string") e.appendChild(document.createTextNode(c));
    else if (c) e.appendChild(c);
  });
  return e;
}
function clearEl(e) { while (e.firstChild) e.removeChild(e.firstChild); }
function matIcon(name, sz) {
  var s = el("span", {className:"material-icons"}, [name]);
  if (sz) s.style.fontSize = sz + "px";
  return s;
}

/* ================================================================
   Theme toggle
   ================================================================ */
function setTheme(id) {
  activeTheme = id;
  document.documentElement.setAttribute("data-theme", id);
  buildThemeToggle();
  renderColors();
}

function buildThemeToggle() {
  var container = document.getElementById("theme-toggle");
  clearEl(container);
  THEMES.forEach(function(t) {
    var btn = el("button", {
      className: "theme-opt" + (activeTheme === t.id ? " active" : ""),
      onclick: function() { setTheme(t.id); }
    }, [matIcon(t.icon, 16), t.label]);
    container.appendChild(btn);
  });
}

/* ================================================================
   YAML-lite parser/serializer for icons.yml
   ================================================================ */
function parseIconsYml(raw) {
  var sections = [];
  var cur = null;
  raw.split("\n").forEach(function(line) {
    var trimmed = line.trim();
    if (!trimmed) return;
    if (line[0] !== " " && trimmed.endsWith(":") && trimmed.indexOf("Icons.") === -1) {
      cur = { title: trimmed.slice(0, -1), items: [] };
      sections.push(cur);
      return;
    }
    if (cur && trimmed.indexOf(":") !== -1) {
      var idx = trimmed.indexOf(":");
      var context = trimmed.slice(0, idx).trim();
      var val = trimmed.slice(idx + 1).trim();
      var iconName = val.replace(/^Icons\./, "");
      if (iconName) cur.items.push({ context: context, icon: iconName });
    }
  });
  return sections;
}

function serializeIconsYml(sections) {
  var lines = [];
  sections.forEach(function(sec, si) {
    if (si > 0) lines.push("");
    lines.push(sec.title + ":");
    sec.items.forEach(function(item) {
      var indent = sec.title === "Tags" ? "  " : "    ";
      lines.push(indent + item.context + ": Icons." + item.icon);
    });
  });
  lines.push("");
  return lines.join("\n");
}

/* ================================================================
   API
   ================================================================ */
function apiRead(filename) {
  return fetch("/api/read/" + filename).then(function(r) { return r.json(); });
}
function apiWrite(filename, content) {
  return fetch("/api/write/" + filename, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({content: content})
  }).then(function(r) { return r.json(); });
}

function setStatus(msg) {
  document.getElementById("status").textContent = msg;
  if (msg) setTimeout(function() {
    var s = document.getElementById("status");
    if (s.textContent === msg) s.textContent = "";
  }, 3000);
}
function markDirty() {
  dirty = true;
  document.getElementById("save-btn").disabled = false;
}
function save() {
  setStatus("Saving...");
  Promise.all([
    apiWrite("icons.yml", serializeIconsYml(iconSections)),
    apiWrite("theme.yml", themeYml)
  ]).then(function() {
    dirty = false;
    document.getElementById("save-btn").disabled = true;
    setStatus("Saved");
  });
}

/* ================================================================
   Tabs — 3 tabs now (Icons, Colors, Typography)
   ================================================================ */
var TABS = [
  { id: "icons",      label: "Icons" },
  { id: "colors",     label: "Colors" },
  { id: "typography", label: "Typography" },
];

function buildTabs() {
  var bar = document.getElementById("tab-bar");
  clearEl(bar);
  TABS.forEach(function(t) {
    var btn = el("button", {
      className: "tab-btn" + (activeTab === t.id ? " active" : ""),
      onclick: function() { activeTab = t.id; buildTabs(); showTab(); }
    }, [t.label]);
    bar.appendChild(btn);
  });
}

function showTab() {
  TABS.forEach(function(t) {
    var panel = document.getElementById("panel-" + t.id);
    if (panel) panel.className = "tab-content" + (activeTab === t.id ? " active" : "");
  });
}

/* ================================================================
   Render: Icons tab
   ================================================================ */
function renderIcons() {
  var panel = document.getElementById("panel-icons");
  if (!panel) return;
  clearEl(panel);

  iconSections.forEach(function(sec, si) {
    panel.appendChild(el("h2", {}, [sec.title]));
    var grid = el("div", {className:"icon-grid"});
    sec.items.forEach(function(item, ii) {
      var key = si + "-" + ii;
      var card = el("div", {
        className: "icon-item",
        onclick: function() { openSidebar(si, ii); }
      }, [
        matIcon(item.icon, 22),
        el("div", {className:"icon-item-info"}, [
          el("span", {className:"icon-item-ctx"}, [item.context]),
          el("span", {className:"icon-item-name"}, ["Icons." + item.icon]),
        ])
      ]);
      if (sidebarKey === key) {
        card.style.borderColor = "var(--v500)";
        card.style.background = "var(--bg-surface)";

/* ================================================================
   Render: Colors tab
   ================================================================ */
function renderColors() {
  var panel = document.getElementById("panel-colors");
  if (!panel) return;
  clearEl(panel);

  var groups = colorPalettes[activeTheme] || colorPalettes.dark;
  var isDark = activeTheme === "dark";
  var label = THEMES.filter(function(t) { return t.id === activeTheme; })[0];
  panel.appendChild(el("h2", {}, [label ? label.label + " Theme" : "Colors"]));
  groups.forEach(function(g, gi) { renderColorGroup(panel, g[0], g[1], isDark, gi); });
}

function renderColorGroup(panel, groupName, colors, isDark, groupIdx) {
  panel.appendChild(el("h3", {}, [groupName]));
  var row = el("div", {className:"color-row"});
  Object.keys(colors).forEach(function(name) {
    var hex = colors[name];
    var box = el("div", {className:"swatch-box"});
    box.style.background = hex;
    if (!isDark && (hex === "#FFFFFF" || hex === "#FAFAFF" || hex === "#F3F0FF")) {
      box.style.borderColor = "#ccc";
    }
    if (isDark && groupName === "Background") {
      box.style.borderColor = "rgba(255,255,255,.15)";
    }
    if (editingColor && editingColor.theme === activeTheme && editingColor.groupIdx === groupIdx && editingColor.colorName === name) {
      box.style.borderColor = "var(--v400)";
      box.style.borderWidth = "3px";
    }
    var swatch = el("div", {className:"swatch", onclick: function() {
      openColorSidebar(activeTheme, groupIdx, name);
    }}, [
      box,
      el("span", {className:"swatch-label"}, [name]),
      el("span", {className:"swatch-hex"}, [hex]),
    ]);
    row.appendChild(swatch);
  });
  panel.appendChild(row);
}

/* ================================================================
   Sidebar — shared open/close, two modes: icon & color
   ================================================================ */
function openSidebarUI() {
  document.getElementById("sidebar").classList.add("open");
  document.getElementById("sidebar-overlay").classList.add("open");
  document.body.classList.add("sidebar-open");
}

function closeSidebar() {
  sidebarMode = null;
  sidebarKey = null;
  editingColor = null;
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("sidebar-overlay").classList.remove("open");
  document.body.classList.remove("sidebar-open");
  renderIcons();
  renderColors();
}

/* ── Icon sidebar ── */
function openSidebar(si, ii) {
  sidebarMode = "icon";
  sidebarKey = si + "-" + ii;
  editingColor = null;
  searchTerm = "";
  document.getElementById("sidebar-search").value = "";
  document.getElementById("sidebar-search").style.display = "";
  openSidebarUI();
  renderSidebarHeader(si, ii);
  renderSidebarBody(si, ii);
  renderIcons();
}

function renderSidebarHeader(si, ii) {
  var item = iconSections[si].items[ii];
  var cur = document.getElementById("sidebar-current");
  clearEl(cur);
  cur.appendChild(matIcon(item.icon, 32));
  cur.appendChild(el("div", {className:"sidebar-current-info"}, [
    el("span", {className:"sidebar-current-ctx"}, [item.context]),
    el("span", {className:"sidebar-current-name"}, ["Icons." + item.icon]),
  ]));
  document.getElementById("sidebar-title").textContent = iconSections[si].title + " \u2014 " + item.context;
}

function renderSidebarBody(si, ii) {
  var item = iconSections[si].items[ii];
  var body = document.getElementById("sidebar-body");
  clearEl(body);
  var grid = el("div", {className:"sidebar-grid"});
  var lowerSearch = searchTerm.toLowerCase();
  ALL_ICONS.forEach(function(iconName) {
    if (lowerSearch && iconName.indexOf(lowerSearch) === -1) return;
    var isActive = iconName === item.icon;
    var btn = el("button", {
      className: "pick-btn" + (isActive ? " active" : ""),
      onclick: function() {
        item.icon = iconName;
        markDirty();
        renderSidebarHeader(si, ii);
        renderSidebarBody(si, ii);
        renderIcons();
      }
    }, [
      matIcon(iconName, 22),
      el("span", {className:"pick-name"}, [iconName])
    ]);
    grid.appendChild(btn);
  });
  body.appendChild(grid);
  body.scrollTop = 0;
}

/* ── Color sidebar ── */
function openColorSidebar(themeName, groupIdx, colorName) {
  sidebarMode = "color";
  sidebarKey = null;
  editingColor = {theme: themeName, groupIdx: groupIdx, colorName: colorName};
  document.getElementById("sidebar-search").style.display = "none";
  openSidebarUI();
  renderColorSidebar();
  renderColors();
}

function getEditingColorValue() {
  if (!editingColor) return "#000000";
  var group = colorPalettes[editingColor.theme][editingColor.groupIdx];
  return group[1][editingColor.colorName] || "#000000";
}

function setEditingColorValue(val) {
  if (!editingColor) return;
  var group = colorPalettes[editingColor.theme][editingColor.groupIdx];
  group[1][editingColor.colorName] = val;
  updateThemeYmlColor(editingColor.theme, group[0], editingColor.colorName, val);
  markDirty();
}

function renderColorSidebar() {
  var groupData = colorPalettes[editingColor.theme][editingColor.groupIdx];
  var groupName = groupData[0];
  var colorName = editingColor.colorName;
  var val = getEditingColorValue();
  var hexForPicker = toHex6(val);

  // Header
  var cur = document.getElementById("sidebar-current");
  clearEl(cur);
  var previewBox = el("div", {});
  previewBox.style.cssText = "width:48px;height:48px;border-radius:10px;border:2px solid var(--bdr-sub);flex-shrink:0";
  previewBox.style.background = val;
  cur.appendChild(previewBox);
  cur.appendChild(el("div", {className:"sidebar-current-info"}, [
    el("span", {className:"sidebar-current-ctx"}, [groupName + " / " + colorName]),
    el("span", {className:"sidebar-current-name"}, [val]),
  ]));
  var themeLabel = THEMES.filter(function(t) { return t.id === editingColor.theme; })[0];
  document.getElementById("sidebar-title").textContent = (themeLabel ? themeLabel.label : "") + " \u2014 " + groupName;

  // Body
  var body = document.getElementById("sidebar-body");
  clearEl(body);

  var bigPreview = el("div", {className:"cpick-preview"});
  bigPreview.style.background = val;
  body.appendChild(bigPreview);

  var row = el("div", {className:"cpick-row"});
  var native = el("input", {className:"cpick-native", type:"color"});
  native.value = hexForPicker;
  native.addEventListener("input", function() {
    var nv = native.value;
    hexInput.value = nv;
    bigPreview.style.background = nv;
    previewBox.style.background = nv;
    cur.querySelector(".sidebar-current-name").textContent = nv;
    setEditingColorValue(nv);
    renderColors();
  });
  row.appendChild(native);

  var hexInput = el("input", {className:"cpick-hex-input", type:"text"});
  hexInput.value = val;
  hexInput.addEventListener("input", function() {
    var v = hexInput.value.trim();
    if (/^#([0-9a-fA-F]{3,8})$/.test(v)) {
      bigPreview.style.background = v;
      previewBox.style.background = v;
      native.value = toHex6(v);
      cur.querySelector(".sidebar-current-name").textContent = v;
      setEditingColorValue(v);
      renderColors();
    }
  });
  row.appendChild(hexInput);
  body.appendChild(row);

  var info = el("div", {className:"cpick-info"}, []);
  info.appendChild(el("span", {}, [editingColor.theme]));
  info.appendChild(document.createTextNode(" > " + groupName + " > " + colorName));
  body.appendChild(info);

  var note = el("div", {className:"cpick-note"}, [
    "Supports #RGB, #RRGGBB, and #RRGGBBAA. Changes save to theme.yml."
  ]);
  body.appendChild(note);
}

function toHex6(v) {
  if (!v || v[0] !== "#") return "#000000";
  var h = v.slice(1);
  if (h.length === 3) h = h[0]+h[0]+h[1]+h[1]+h[2]+h[2];
  if (h.length >= 6) return "#" + h.slice(0,6);
  return "#000000";
}

function updateThemeYmlColor(themeName, groupName, colorName, newVal) {
  var lines = themeYml.split("\n");
  var inTheme = false;
  var inGroup = false;
  var themeHeader = themeName.charAt(0).toUpperCase() + themeName.slice(1) + ":";
  for (var i = 0; i < lines.length; i++) {
    var trimmed = lines[i].trim();
    if (/^\S/.test(lines[i]) && trimmed.endsWith(":")) {
      inTheme = (trimmed === themeHeader);
      inGroup = false;
      continue;
    }
    if (!inTheme) continue;
    if (/^\s{2}\S/.test(lines[i]) && trimmed.endsWith(":") && trimmed.indexOf('"') === -1) {
      inGroup = (trimmed === groupName + ":");
      continue;
    }
    if (!inGroup) continue;
    var keyMatch = trimmed.match(/^(\S+):\s/);
    if (keyMatch && keyMatch[1] === colorName) {
      var leading = lines[i].match(/^(\s*)/)[1];
      var commentMatch = lines[i].match(/(\s+#[^"]*$)/);
      var comment = commentMatch ? commentMatch[1] : "";
      lines[i] = leading + colorName + ': "' + newVal + '"' + comment;
      break;
    }
  }
  themeYml = lines.join("\n");
}

/* ================================================================
   Event listeners
   ================================================================ */
document.getElementById("sidebar-close").addEventListener("click", closeSidebar);
document.getElementById("sidebar-overlay").addEventListener("click", closeSidebar);
document.getElementById("sidebar-search").addEventListener("input", function(e) {
  searchTerm = e.target.value;
  if (sidebarKey) {
    var p = sidebarKey.split("-");
    renderSidebarBody(parseInt(p[0]), parseInt(p[1]));
  }
});
document.getElementById("save-btn").addEventListener("click", save);

/* ================================================================
   Init
   ================================================================ */
function buildPanels() {
  var panels = document.getElementById("panels");
  clearEl(panels);
  TABS.forEach(function(t) {
    panels.appendChild(el("div", {
      id: "panel-" + t.id,
      className: "tab-content" + (activeTab === t.id ? " active" : "")
    }));
  });
}

function renderAll() {
  renderIcons();
  renderColors();
  renderTypography();
}

buildTabs();
buildThemeToggle();
buildPanels();
setStatus("Loading...");

Promise.all([apiRead("icons.yml"), apiRead("theme.yml")]).then(function(results) {
  iconsYml = results[0].content;
  themeYml = results[1].content;
  iconSections = parseIconsYml(iconsYml);
  renderAll();
  setStatus("Loaded");
}).catch(function(err) {
  setStatus("Error loading");
  console.error(err);
});
</script>
