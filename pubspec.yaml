name: mymantra
description: "MyMantra – Practice, No Attachment. A spiritual mantra repetition app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.2.1

  # Navigation
  go_router: ^17.1.0

  # Persistence
  shared_preferences: ^2.3.4

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  yaml: ^3.1.2

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/icons/Lotus.png"
  min_sdk_android: 21 # android min sdk min:16, default 21
  web:
    generate: true
    image_path: "assets/images/icons/Lotus.png"
    background_color: "#ffffff"
    theme_color: "#ffffff"
  macos:
    generate: true
    image_path: "assets/images/icons/Lotus.png"
  linux:
    generate: true
    image_path: "assets/images/icons/Lotus.png"
  windows:
    generate: true
    image_path: "assets/images/icons/Lotus.png"

flutter:
  uses-material-design: true

  assets:
    - assets/audio/notification-sounds/
    - assets/data/
    - assets/fonts/
    - assets/images/
    - assets/images/icons/

  fonts:
    # ── UI headers ─────────────────────────────────────────────────────────
    - family: Cinzel                   # Latin – English titles/headers
      fonts:
        - asset: assets/fonts/Cinzel-Variable.ttf

    # ── Mantra scripts ─────────────────────────────────────────────────────
    - family: NotoSans                 # Latin / Greek / Cyrillic – English, European, Russian
      fonts:
        - asset: assets/fonts/NotoSans-Variable.ttf

    - family: NotoSansDevanagari       # Devanagari – Sanskrit, Hindi, Marathi
      fonts:
        - asset: assets/fonts/NotoSansDevanagari-Variable.ttf

    - family: NotoSansHebrew           # Hebrew
      fonts:
        - asset: assets/fonts/NotoSansHebrew-Variable.ttf

    - family: NotoSansArabic           # Arabic, Urdu, Farsi
      fonts:
        - asset: assets/fonts/NotoSansArabic-Variable.ttf

    - family: NotoSerifTibetan         # Tibetan (Buddhist mantras)
      fonts:
        - asset: assets/fonts/NotoSerifTibetan-Variable.ttf

    - family: NotoSansThai             # Thai (Theravada Buddhist mantras)
      fonts:
        - asset: assets/fonts/NotoSansThai-Variable.ttf

    - family: NotoSansTamil            # Tamil (Shaiva/Vaishnava mantras)
      fonts:
        - asset: assets/fonts/NotoSansTamil-Variable.ttf

    - family: NotoSansGujarati         # Gujarati (Jain mantras)
      fonts:
        - asset: assets/fonts/NotoGujarati-Variable.ttf

    # ── CJK ────────────────────────────────────────────────────────────────
    - family: NotoSansSC               # Simplified Chinese (Mandarin Buddhist mantras)
      fonts:
        - asset: assets/fonts/NotoSansSC-Variable.ttf

    - family: NotoSansJP               # Japanese (Zen / Shingon mantras)
      fonts:
        - asset: assets/fonts/NotoSansJP-Variable.ttf

    - family: NotoSansKR               # Korean (Korean Buddhist mantras)
      fonts:
        - asset: assets/fonts/NotoSansKR-Variable.ttf

    - family: NotoColorEmoji           # Color emoji
      fonts:
        - asset: assets/fonts/NotoColorEmoji.ttf
