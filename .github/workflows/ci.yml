name: CI

# Runs on every push to any branch and on every pull request targeting main.
on:
  push:
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Install & warm cache ──────────────────────────────────────────────
  install:
    name: Install
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with: { channel: stable, cache: true }
      - name: Restore install cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            assets/fonts/
            linux/
            ios/
            android/
          key: ${{ runner.os }}-install-${{ hashFiles('pubspec.lock', 'make/install.sh') }}
          restore-keys: ${{ runner.os }}-install-
      - name: Cache apt packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: clang cmake ninja-build libgtk-3-dev xvfb
          version: 1.0
      - name: Install (make install)
        run: make install TARGET=linux

  # ── Job 2: Static analysis ───────────────────────────────────────────────────
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with: { channel: stable, cache: true }
      - name: Restore install cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            assets/fonts/
            linux/
            ios/
            android/
          key: ${{ runner.os }}-install-${{ hashFiles('pubspec.lock', 'make/install.sh') }}
          restore-keys: ${{ runner.os }}-install-
      - name: Flutter pub get
        run: flutter pub get
      - name: Lint
        run: flutter analyze

  # ── Job 3: Unit tests ────────────────────────────────────────────────────────
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with: { channel: stable, cache: true }
      - name: Restore install cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            assets/fonts/
            linux/
            ios/
            android/
          key: ${{ runner.os }}-install-${{ hashFiles('pubspec.lock', 'make/install.sh') }}
          restore-keys: ${{ runner.os }}-install-
      - name: Flutter pub get
        run: flutter pub get
      - name: Unit tests
        run: flutter test test/unit/ --coverage

  # ── Job 4: Widget tests ──────────────────────────────────────────────────────
  widget-test:
    name: Widget Tests
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with: { channel: stable, cache: true }
      - name: Restore install cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            assets/fonts/
            linux/
            ios/
            android/
          key: ${{ runner.os }}-install-${{ hashFiles('pubspec.lock', 'make/install.sh') }}
          restore-keys: ${{ runner.os }}-install-
      - name: Flutter pub get
        run: flutter pub get
      - name: Widget tests
        run: flutter test test/widget/

  # ── Job 5: Integration tests (Linux desktop) ─────────────────────────────────
  integration-linux:
    name: Integration Tests (Linux)
    runs-on: ubuntu-latest
    needs: [analyze, unit-test, widget-test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with: { channel: stable, cache: true }
      - name: Restore install cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            assets/fonts/
            linux/
            ios/
            android/
          key: ${{ runner.os }}-install-${{ hashFiles('pubspec.lock', 'make/install.sh') }}
          restore-keys: ${{ runner.os }}-install-
      - name: Cache apt packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: clang cmake ninja-build libgtk-3-dev xvfb
          version: 1.0
      - name: Flutter pub get
        run: flutter pub get
      - name: Integration tests (headless)
        run: make test-integration
